services:
  - type: web
    name: deskai-api
    runtime: node
    plan: free
    buildCommand: >-
      cd backend &&
      cp prisma/render-schema.prisma prisma/schema.prisma &&
      npm install &&
      npx prisma generate &&
      npx nest build
    startCommand: cd backend && npx prisma db push --accept-data-loss --skip-generate && npx ts-node seed-standalone.ts && node dist/main
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: deskai-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

databases:
  - name: deskai-db
    plan: free
    databaseName: deskai
